# ==============================================================================
# Docker Compose — Redis Only
# ==============================================================================
# PostgreSQL is hosted on Supabase (cloud, free tier).
# We only need Redis locally for caching and rate limiting.
#
# USAGE:
#   Start:  docker-compose up -d
#   Stop:   docker-compose down
#   Logs:   docker-compose logs -f
#   Reset:  docker-compose down -v
# ==============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: support_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
