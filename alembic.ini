# Alembic Configuration File
# See: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts (relative to project root)
script_location = alembic

# Template used to generate migration file names
# Includes date for chronological ordering
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

# Database URL — overridden by env.py to use our settings
# This is just a placeholder
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
